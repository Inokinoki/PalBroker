name: PR Tests

# PR Tests - Safe for untrusted PRs (NO API keys used)
on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read  # No write permissions

jobs:
  # Unit tests - No API keys needed
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run unit tests
        run: |
          echo "Running unit tests (no API keys needed)..."
          go test -v ./internal/...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            coverage.out
            test-results.txt
          retention-days: 7

  # Build test - Verify code compiles
  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build binary
        run: |
          echo "Building pal-broker..."
          go build -o pal-broker ./cmd/pal-broker
          ./pal-broker --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-binary
          path: pal-broker
          retention-days: 7

  # Code quality checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run go vet
        run: |
          echo "Running go vet..."
          go vet ./...

      - name: Check code formatting
        run: |
          echo "Checking code formatting..."
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Code is not formatted. Run 'go fmt ./...'"
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
          echo "✅ Code is properly formatted"

  # PR summary
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, build-test, code-quality]
    if: always()
    steps:
      - name: Generate PR summary
        run: |
          echo "## 📊 PR Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Test | ${{ needs.build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.unit-tests.result }}" == "success" ] && \
             [ "${{ needs.build-test.result }}" == "success" ] && \
             [ "${{ needs.code-quality.result }}" == "success" ]; then
            echo "✅ All PR tests passed!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔒 Security" >> $GITHUB_STEP_SUMMARY
            echo "- Unit tests: No API keys used ✅" >> $GITHUB_STEP_SUMMARY
            echo "- Build test: No secrets accessed ✅" >> $GITHUB_STEP_SUMMARY
            echo "- Safe for untrusted PRs ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some PR tests failed" >> $GITHUB_STEP_SUMMARY
          fi
