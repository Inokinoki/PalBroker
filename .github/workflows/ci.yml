name: CI - Format, Lint & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 完整 CI 流程（使用 Makefile）
  ci-pipeline:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run full CI pipeline
        run: |
          echo "Running full CI pipeline..."
          make all
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-linux-amd64
          path: pal-broker
          retention-days: 7

  # 多平台构建（使用 Makefile）
  cross-platform-build:
    name: Cross-Platform Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build all platforms
        run: |
          echo "Building for all platforms..."
          make build-all

      - name: Upload Linux amd64
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-linux-amd64
          path: pal-broker-linux-amd64
          retention-days: 7

      - name: Upload Linux arm64
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-linux-arm64
          path: pal-broker-linux-arm64
          retention-days: 7

      - name: Upload macOS amd64
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-darwin-amd64
          path: pal-broker-darwin-amd64
          retention-days: 7

      - name: Upload macOS arm64
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-darwin-arm64
          path: pal-broker-darwin-arm64
          retention-days: 7

  # 代码质量检查（使用 Makefile）
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2

      - name: Run code quality checks
        run: |
          echo "Running code quality checks..."
          make check

  # 集成测试（使用 Makefile）
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          go test -tags=integration -v ./tests/integration/...

  # CI 总结
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ci-pipeline, cross-platform-build, code-quality, integration-tests]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Pipeline | ${{ needs.ci-pipeline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cross-Platform Build | ${{ needs.cross-platform-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.ci-pipeline.result }}" == "success" ] && \
             [ "${{ needs.cross-platform-build.result }}" == "success" ]; then
            echo "✅ All critical checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some checks failed or were skipped" >> $GITHUB_STEP_SUMMARY
          fi
