name: CI - Format, Lint & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 完整 CI 流程（使用 Makefile）
  ci-pipeline:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run full CI pipeline
        run: |
          echo "Running full CI pipeline..."
          make all
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-ci-pipeline
          path: pal-broker
          retention-days: 7

  # Cross-platform tests
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests
        run: |
          echo "Running tests on macOS..."
          go test -v ./internal/...
          go test -v ./cmd/...

      - name: Build binary
        run: |
          echo "Building for macOS..."
          go build -o pal-broker-macos ./cmd/pal-broker
          ./pal-broker-macos --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-macos-amd64
          path: pal-broker-macos
          retention-days: 7

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests
        run: |
          Write-Host "Running tests on Windows..."
          go test -v ./internal/...
          go test -v ./cmd/...

      - name: Build binary
        run: |
          Write-Host "Building for Windows..."
          go build -o pal-broker-windows.exe ./cmd/pal-broker
          ./pal-broker-windows.exe --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-windows-amd64
          path: pal-broker-windows.exe
          retention-days: 7

  # 多平台构建（使用 Makefile）
  cross-platform-build:
    name: Cross-Platform Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build all platforms
        run: |
          echo "Building for all platforms..."
          make build-all

      - name: Upload Linux amd64
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-linux-amd64
          path: pal-broker-linux-amd64
          retention-days: 7

      - name: Upload Linux arm64
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-linux-arm64
          path: pal-broker-linux-arm64
          retention-days: 7

      - name: Upload macOS amd64
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-darwin-amd64
          path: pal-broker-darwin-amd64
          retention-days: 7

      - name: Upload macOS arm64
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-darwin-arm64
          path: pal-broker-darwin-arm64
          retention-days: 7

  # 代码质量检查（使用 Makefile）
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.62.0

      - name: Run code quality checks
        run: |
          echo "Running code quality checks..."
          make check || echo "Warning: Some checks failed, continuing..."
        continue-on-error: true

  # 集成测试（使用 Makefile）
  integration-tests:
    name: Integration Tests (Secure)
    runs-on: ubuntu-latest
    # Use protected environment for security
    environment: integration-tests
    env:
      # API Keys from GitHub Secrets (only available if configured)
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Create test directories
        run: |
          mkdir -p /tmp/workspace
          mkdir -p /tmp/pal-broker-sessions

      - name: Create functional mock CLIs for testing
        run: |
          echo "Creating functional mock CLIs for integration testing..."
          mkdir -p /tmp/mock-clis

          # Create mock claude CLI
          cat > /tmp/mock-clis/claude << 'EOF'
          #!/bin/bash
          # Mock Claude CLI for testing
          if [[ "$1" == "-p" ]] || [[ "$1" == "--prompt" ]]; then
            # Simulate tool calling response
            echo '{"type":"assistant","content":"Mock Claude response for testing. I can help with file operations and coding tasks."}'
            echo '{"type":"tool_use","tool_use":{"name":"read_file","input":{"file_path":"test.txt"}}}'
            echo '{"type":"chunk","content":"Response completed"}'
          else
            echo "Mock Claude CLI v1.0.0"
          fi
          EOF
          chmod +x /tmp/mock-clis/claude

          # Create mock codex CLI
          cat > /tmp/mock-clis/codex << 'EOF'
          #!/bin/bash
          # Mock Codex CLI for testing
          if [[ "$1" == "exec" ]]; then
            # Simulate tool calling response
            echo '{"response":"Mock Codex response for testing. I can assist with code and file operations."}'
            echo '{"tool_calls":[{"name":"read_file","arguments":"{\\"file_path\\": \\"test.txt\\"}"}]}'
          elif [[ "$1" == "resume" ]] && [[ "$2" == "--last" ]]; then
            echo '{"response":"Mock Codex session resumed"}'
          else
            echo "Mock Codex CLI v1.0.0"
          fi
          EOF
          chmod +x /tmp/mock-clis/codex

          # Create mock copilot CLI
          cat > /tmp/mock-clis/copilot << 'EOF'
          #!/bin/bash
          # Mock Copilot CLI for testing
          if [[ "$1" == "--acp" ]] && [[ "$2" == "--stdio" ]]; then
            # ACP mode - continuously respond to JSON-RPC requests
            while IFS= read -r line; do
              if [[ -n "$line" ]]; then
                # Parse the method and respond appropriately
                if echo "$line" | grep -q '"method".*"initialize"'; then
                  echo '{"jsonrpc":"2.0","id":1,"result":{"protocolVersion":1,"serverInfo":{"name":"mock-copilot","version":"1.0.0"}}}'
                elif echo "$line" | grep -q '"method".*"session/new"'; then
                  echo '{"jsonrpc":"2.0","id":2,"result":{"sessionId":"mock-session-'$(date +%s)'","capabilities":{}}}'
                elif echo "$line" | grep -q '"method".*"session/prompt"'; then
                  echo '{"jsonrpc":"2.0","id":3,"result":{"message":{"role":"assistant","content":{"text":"Mock Copilot response for testing"}}}}'
                else
                  echo '{"jsonrpc":"2.0","id":0,"result":{}}'
                fi
              fi
            done
          else
            echo "Mock Copilot CLI v1.0.0"
          fi
          EOF
          chmod +x /tmp/mock-clis/copilot

          # Create mock gemini CLI
          cat > /tmp/mock-clis/gemini << 'EOF'
          #!/bin/bash
          # Mock Gemini CLI for testing
          if [[ "$1" == "chat" ]] && [[ "$2" == "--prompt" ]]; then
            echo '{"response":"Mock Gemini response for testing"}'
          else
            echo "Mock Gemini CLI v1.0.0"
          fi
          EOF
          chmod +x /tmp/mock-clis/gemini

          # Create mock opencode CLI
          cat > /tmp/mock-clis/opencode << 'EOF'
          #!/bin/bash
          # Mock OpenCode CLI for testing
          if [[ "$1" == "acp" ]]; then
            echo '{"jsonrpc":"2.0","id":1,"result":{"status":"ready"}}'
          else
            echo "Mock OpenCode CLI v1.0.0"
          fi
          EOF
          chmod +x /tmp/mock-clis/opencode

          # Add mock CLIs to PATH
          echo "/tmp/mock-clis" >> $GITHUB_PATH

          echo "Mock CLIs created successfully"

      - name: Verify CLI installations
        run: |
          echo "Verifying CLI installations..."
          echo "Claude CLI: $(which claude || echo 'not found')"
          echo "Codex CLI: $(which codex || echo 'not found')"
          echo "Copilot CLI: $(which copilot || echo 'not found')"
          echo "Gemini CLI: $(which gemini || echo 'not found')"
          echo "OpenCode CLI: $(which opencode || echo 'not found')"

          # Test basic functionality
          echo ""
          echo "Testing CLI availability..."
          command -v claude && echo "✓ claude available" || echo "✗ claude not available"
          command -v codex && echo "✓ codex available" || echo "✗ codex not available"
          command -v copilot && echo "✓ copilot available" || echo "✗ copilot not available"
          command -v gemini && echo "✓ gemini available" || echo "✗ gemini not available"
          command -v opencode && echo "✓ opencode available" || echo "✗ opencode not available"

          echo ""
          echo "Testing CLI basic functionality..."
          claude -p "test" | head -1
          codex exec "test" | head -1
          echo "CLIs are ready for testing"

      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          echo "Available API keys:"
          [ -n "$ANTHROPIC_API_KEY" ] && echo "✓ ANTHROPIC_API_KEY" || echo "✗ ANTHROPIC_API_KEY"
          [ -n "$CLAUDE_API_KEY" ] && echo "✓ CLAUDE_API_KEY" || echo "✗ CLAUDE_API_KEY"
          [ -n "$GEMINI_API_KEY" ] && echo "✓ GEMINI_API_KEY" || echo "✗ GEMINI_API_KEY"
          [ -n "$GOOGLE_API_KEY" ] && echo "✓ GOOGLE_API_KEY" || echo "✗ GOOGLE_API_KEY"
          [ -n "$GITHUB_TOKEN" ] && echo "✓ GITHUB_TOKEN" || echo "✗ GITHUB_TOKEN"
          [ -n "$COPILOT_GITHUB_TOKEN" ] && echo "✓ COPILOT_GITHUB_TOKEN" || echo "✗ COPILOT_GITHUB_TOKEN"
          [ -n "$OPENAI_API_KEY" ] && echo "✓ OPENAI_API_KEY" || echo "✗ OPENAI_API_KEY"
          echo ""
          go test -tags=integration -v ./tests/integration/...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            *.log
          retention-days: 7

  # CI 总结
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ci-pipeline, cross-platform-build, code-quality, integration-tests, test-macos, test-windows]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Pipeline | ${{ needs.ci-pipeline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cross-Platform Build | ${{ needs.cross-platform-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌍 Cross-Platform Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux 🐧 | ${{ needs.ci-pipeline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS 🍎 | ${{ needs.test-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows 🪟 | ${{ needs.test-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.ci-pipeline.result }}" == "success" ] && \
             [ "${{ needs.cross-platform-build.result }}" == "success" ]; then
            echo "✅ All critical checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some checks failed or were skipped" >> $GITHUB_STEP_SUMMARY
          fi
