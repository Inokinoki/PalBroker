name: Integration Tests

on:
  push:
    branches: [ main ]  # Only run on main branch pushes
  workflow_dispatch:  # Allow manual triggering by maintainers

# CRITICAL SECURITY: Restrict permissions
permissions:
  contents: read  # No write permissions - prevents stealing secrets
  issues: read
  pull-requests: read

jobs:
  # Unit tests (no API keys needed)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          go test -v ./internal/...

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            coverage.out
            test-results.txt
          retention-days: 7

  # Integration tests with all API keys
  integration-tests:
    name: Integration Tests (Secure)
    runs-on: ubuntu-latest
    # Use protected environment for security
    environment: integration-tests
    env:
      # API Keys from GitHub Secrets
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Test configuration
      PAL_PROVIDER: claude
      PAL_WORK_DIR: /tmp/workspace
      PAL_SESSION_DIR: /tmp/pal-broker-sessions
      CGO_ENABLED: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Create workspace directory
        run: mkdir -p $PAL_WORK_DIR $PAL_SESSION_DIR

      - name: Install Claude Code CLI
        run: |
          echo "Installing Claude Code CLI..."
          curl -fsSL https://cdn.jsdelivr.net/npm/@anthropic-ai/claude-code@latest/dist/install.sh | sh
          claude --version || echo "Claude CLI installed"

      - name: Skip Codex CLI installation
        run: |
          echo "Skipping Codex CLI installation - package not available in npm"
          echo "Tests will skip if OPENAI_API_KEY is not configured"

      - name: Install GitHub Copilot CLI
        run: |
          echo "Installing GitHub Copilot CLI..."
          npm install -g @github-copilot-cli/cli
          export PATH="$(npm prefix -g)/bin:$PATH"
          copilot --version || echo "copilot CLI installed"

      - name: Install Google Gemini CLI (gemini-cli)
        run: |
          echo "Installing Gemini CLI..."
          npm install -g gemini-cli
          export PATH="$(npm prefix -g)/bin:$PATH"
          gemini --version || echo "gemini CLI installed"

      - name: Install OpenCode CLI
        run: |
          echo "Installing OpenCode CLI..."
          npm i -g opencode-ai
          echo "npm prefix -g: $(npm prefix -g)"
          echo "Adding npm global bin to PATH..."
          export PATH="$(npm prefix -g)/bin:$PATH"
          echo "PATH: $PATH"
          which opencode || echo "opencode not found in PATH"
          opencode --version

      - name: Verify CLI installations
        run: |
          echo "Verifying CLI installations..."
          export PATH="$(npm prefix -g)/bin:$PATH"
          echo "Claude CLI:"
          which claude || echo "claude not found"
          echo "Codex CLI:"
          echo "  Skipped - package not available in npm"
          echo "Copilot CLI:"
          which copilot || echo "copilot not found"
          echo "Gemini CLI:"
          which gemini || echo "gemini not found"
          echo "OpenCode CLI:"
          which opencode || echo "opencode not found"

          echo ""
          echo "Listing all available CLI commands:"
          ls -la /usr/local/bin/ | grep -E "(claude|copilot|gemini|opencode)" || echo "No matching CLIs found"

          echo ""
          echo "Testing OpenCode CLI specifically:"
          if command -v opencode &> /dev/null; then
            echo "✓ opencode found at: $(which opencode)"
            opencode --version || echo "Could not get opencode version"
          else
            echo "✗ opencode not found"
            echo "Searching for opencode in npm global directory..."
            find $(npm prefix -g) -name "opencode" -type f 2>/dev/null || echo "No opencode executable found"
          fi

      - name: Verify Claude API key
        id: verify-claude
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$CLAUDE_API_KEY" ]; then
            echo "❌ ERROR: Claude API key not configured"
            echo "Please add ANTHROPIC_API_KEY or CLAUDE_API_KEY to integration-tests environment"
            exit 1
          fi
          echo "✅ Claude API key configured"

      - name: Test with Claude
        if: success()
        run: |
          echo "Testing Claude Code integration..."
          export PATH="$(npm prefix -g)/bin:$PATH"
          go test -tags=integration -run TestClaude -v ./tests/integration/...

      - name: Verify Codex API key
        id: verify-codex
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "❌ ERROR: Codex API key not configured"
            echo "Please add OPENAI_API_KEY to integration-tests environment"
            exit 1
          fi
          echo "✅ Codex API key configured"

      - name: Test with Codex
        if: success()
        run: |
          echo "Testing Codex integration..."
          export PATH="$(npm prefix -g)/bin:$PATH"
          go test -tags=integration -run TestCodex -v ./tests/integration/...

      - name: Test with Gemini
        if: ${{ env.GEMINI_API_KEY != '' || env.GOOGLE_API_KEY != '' }}
        run: |
          echo "Testing Gemini integration..."
          export PATH="$(npm prefix -g)/bin:$PATH"
          go test -tags=integration -run TestGemini -v ./tests/integration/... || echo "Some Gemini tests skipped (expected in CI)"
        continue-on-error: true

      - name: Verify Copilot API key
        id: verify-copilot
        run: |
          if [ -z "$GITHUB_TOKEN" ] && [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "❌ ERROR: GitHub/Copilot API key not configured"
            echo "Please add GITHUB_TOKEN or COPILOT_GITHUB_TOKEN to integration-tests environment"
            exit 1
          fi
          echo "✅ Copilot API key configured"

      - name: Test with Copilot
        if: success()
        run: |
          echo "Testing Copilot integration..."
          export PATH="$(npm prefix -g)/bin:$PATH"
          go test -tags=integration -run TestCopilot -v ./tests/integration/...

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            *.log
          retention-days: 7


  # Test summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ Integration tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Integration tests failed or skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔑 Required API Keys" >> $GITHUB_STEP_SUMMARY
            echo "- **Claude**: ANTHROPIC_API_KEY or CLAUDE_API_KEY ❌ Required" >> $GITHUB_STEP_SUMMARY
            echo "- **Codex**: OPENAI_API_KEY ❌ Required" >> $GITHUB_STEP_SUMMARY
            echo "- **Copilot**: GITHUB_TOKEN or COPILOT_GITHUB_TOKEN ❌ Required" >> $GITHUB_STEP_SUMMARY
            echo "- **Gemini**: GEMINI_API_KEY or GOOGLE_API_KEY ⚠️ Optional" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Security" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests only run on main branch" >> $GITHUB_STEP_SUMMARY
          echo "- Protected environment required for API keys" >> $GITHUB_STEP_SUMMARY
          echo "- PR authors cannot access API keys" >> $GITHUB_STEP_SUMMARY
