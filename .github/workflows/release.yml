name: Build & Release

on:
  push:
    tags:
      - 'v*'  # 仅在推送标签时触发，如 v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  # 使用 Makefile 构建所有平台
  build:
    name: Build All Platforms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build all platforms using Makefile
        run: |
          echo "Building for all platforms..."
          make build-all

      - name: Upload all binaries
        uses: actions/upload-artifact@v4
        with:
          name: pal-broker-binaries
          path: pal-broker-*
          retention-days: 30

  # 创建 GitHub Release（使用 Makefile）
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: pal-broker-binaries
          path: ./binaries

      - name: Create release archives using Makefile
        run: |
          echo "Creating release archives..."
          make release VERSION=${{ steps.get_version.outputs.version }}

      - name: Generate changelog
        run: |
          cat > CHANGELOG.md << EOF
          # Release ${{ steps.get_version.outputs.version }}
          
          ## 🎉 What's New
          
          - Multi-platform builds for Linux, macOS, and Windows
          - Support for amd64, arm64 architectures
          - Optimized binary size with CGO disabled
          - Enhanced configuration with environment variables
          - File-based status monitoring
          
          ## 📦 Installation
          
          ### Linux
          \`\`\`bash
          # AMD64
          wget https://github.com/\${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/pal-broker-linux-amd64.tar.gz
          tar -xzf pal-broker-linux-amd64.tar.gz
          sudo mv pal-broker-linux-amd64 /usr/local/bin/pal-broker
          
          # ARM64
          wget https://github.com/\${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/pal-broker-linux-arm64.tar.gz
          tar -xzf pal-broker-linux-arm64.tar.gz
          sudo mv pal-broker-linux-arm64 /usr/local/bin/pal-broker
          \`\`\`
          
          ### macOS
          \`\`\`bash
          # AMD64 (Intel)
          wget https://github.com/\${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/pal-broker-darwin-amd64.tar.gz
          tar -xzf pal-broker-darwin-amd64.tar.gz
          sudo mv pal-broker-darwin-amd64 /usr/local/bin/pal-broker
          
          # ARM64 (Apple Silicon)
          wget https://github.com/\${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/pal-broker-darwin-arm64.tar.gz
          tar -xzf pal-broker-darwin-arm64.tar.gz
          sudo mv pal-broker-darwin-arm64 /usr/local/bin/pal-broker
          \`\`\`
          
          ## 🚀 Usage
          
          \`\`\`bash
          # Basic usage
          pal-broker run --provider claude --quest-id q1 --task "Your task"
          
          # With configuration
          pal-broker run \\
            --provider claude \\
            --cli-path /usr/local/bin/claude \\
            --work-dir /workspace \\
            --quest-id q1 \\
            --task "Your task"
          \`\`\`
          
          ## 📝 Notes
          
          - Make sure you have the respective AI CLI installed
          - Run in screen/tmux for long-running tasks
          - See documentation for detailed usage
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            dist/*.tar.gz
            dist/*.zip

  # 总结
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [build, release]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.get_version.outputs.version || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.release.result }}" == "success" ]; then
            echo "✅ Release created successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 Download: https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Release process had issues" >> $GITHUB_STEP_SUMMARY
          fi
